<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111113;
      color: #a78bfa;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      user-select: none;
      -webkit-app-region: drag;
    }
    img { width: 64px; height: 64px; border-radius: 14px; }
    h1 { font-size: 22px; font-weight: 700; color: #e4e4e7; letter-spacing: -0.5px; }
    p { font-size: 13px; color: #71717a; }
    .dots { display: flex; gap: 6px; }
    .dot {
      width: 7px; height: 7px;
      background: #8b5cf6;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <img src="./build/icon.icns" onerror="this.style.display='none'">
  <div>
    <h1>Netindavoid</h1>
    <p style="text-align:center;margin-top:4px">Starting services…</p>
  </div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
