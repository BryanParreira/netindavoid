<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #13141a;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      user-select: none;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    /* subtle vignette */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(124,58,237,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 18px;
      box-shadow: 0 0 0 1px rgba(124,58,237,0.2), 0 8px 24px rgba(0,0,0,0.5);
    }
    .logo-wrap img { width: 52px; height: 52px; display: block; }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #e2e4f0;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    #status {
      font-size: 11px;
      color: #4a4d6a;
      letter-spacing: 0.02em;
      height: 16px;
      transition: opacity 0.3s;
    }

    /* pulse bar */
    .bar-track {
      width: 140px;
      height: 2px;
      background: rgba(124,58,237,0.12);
      border-radius: 9999px;
      margin-top: 24px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, #7c3aed, #a78bfa, transparent);
      border-radius: 9999px;
      animation: slide 1.6s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(450%); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="./build/icon.icns" onerror="this.parentElement.style.display='none'">
  </div>
  <h1>Netindavoid</h1>
  <div id="status">Starting services…</div>
  <div class="bar-track">
    <div class="bar-fill"></div>
  </div>
</body>
</html>
